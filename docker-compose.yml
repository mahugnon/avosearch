services:
  db:
    image: postgres:16-alpine
    container_name: avosearch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lexpresso
    ports:
      # 5433 on the host: 5432 is commonly taken by a local Postgres install
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
